<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Google Fonts - 独特字体组合（避免 Inter/Roboto/Arial）-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family={{FONT_HEADING}}:wght@400;600;800;900&family={{FONT_BODY}}:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ============================================
           设计美学变量 - 生成时替换
           ============================================ */
        :root {
            /* 字体 */
            --font-heading: '{{FONT_HEADING}}', sans-serif;
            --font-body: '{{FONT_BODY}}', sans-serif;

            /* 色彩体系 - 主色突出、点缀鲜明 */
            --bg-primary: {{BG_PRIMARY}};
            --bg-secondary: {{BG_SECONDARY}};
            --bg-card: {{BG_CARD}};
            --text-primary: {{TEXT_PRIMARY}};
            --text-secondary: {{TEXT_SECONDARY}};
            --accent: {{ACCENT}};              /* 主色 - 80% 视觉焦点 */
            --accent-hover: {{ACCENT_HOVER}};
            --accent-secondary: {{ACCENT_SECONDARY}}; /* 点缀色 - 关键交互 */
            --success: {{SUCCESS_COLOR}};
            --warning: {{WARNING_COLOR}};
            --error: {{ERROR_COLOR}};
            --border: {{BORDER_COLOR}};
            --shadow-color: {{SHADOW_COLOR}};

            /* 特效变量 */
            --glow: 0 0 30px -5px var(--accent);
            --hard-shadow: {{HARD_SHADOW}};
        }

        /* ============================================
           字体排版 - 强字重对比
           ============================================ */
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 800;  /* 强字重 */
        }

        .text-display {
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        /* ============================================
           动效系统 - 入场动画 + 微交互
           ============================================ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: var(--glow); }
            50% { box-shadow: 0 0 50px -5px var(--accent); }
        }

        /* 入场动画类 */
        .animate-in {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* ============================================
           组件样式 - 独特设计语言
           ============================================ */
    </style>
    <style type="text/tailwindcss">
        @layer components {
            /* ==================== 按钮 ==================== */
            .btn {
                @apply inline-flex items-center justify-center gap-2 font-medium transition-all duration-300;
                font-family: var(--font-body);
            }
            .btn-primary {
                background: var(--accent);
                color: white;
                @apply px-6 py-3;
            }
            .btn-primary:hover {
                background: var(--accent-hover);
                transform: translateY(-2px);
                box-shadow: var(--glow);
            }
            .btn-secondary {
                background: transparent;
                color: var(--text-primary);
                border: 1px solid var(--border);
                @apply px-6 py-3;
            }
            .btn-secondary:hover {
                border-color: var(--accent);
                color: var(--accent);
            }
            .btn-ghost {
                background: transparent;
                color: var(--text-secondary);
                @apply px-4 py-2;
            }
            .btn-ghost:hover {
                color: var(--accent);
                background: color-mix(in srgb, var(--accent) 10%, transparent);
            }
            .btn-danger {
                background: var(--error);
                color: white;
                @apply px-6 py-3;
            }
            .btn-danger:hover {
                filter: brightness(1.1);
                transform: translateY(-2px);
            }

            /* ==================== 卡片 ==================== */
            .card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                @apply rounded-lg p-6;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .card:hover {
                border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
                box-shadow: 0 10px 40px -15px var(--shadow-color);
            }
            .card-glass {
                background: color-mix(in srgb, var(--bg-card) 80%, transparent);
                backdrop-filter: blur(10px);
                border: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
            }

            /* ==================== 表单 ==================== */
            .form-input {
                background: var(--bg-card);
                border: 1px solid var(--border);
                color: var(--text-primary);
                @apply w-full px-4 py-3 rounded-lg;
                font-family: var(--font-body);
                transition: all 0.2s ease;
            }
            .form-input:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
            }
            .form-input::placeholder {
                color: var(--text-secondary);
                opacity: 0.6;
            }
            .form-label {
                @apply block mb-2 font-medium;
                color: var(--text-primary);
                font-family: var(--font-body);
            }

            /* ==================== 表格 ==================== */
            .table-container {
                @apply overflow-x-auto rounded-lg;
                border: 1px solid var(--border);
            }
            .table {
                @apply w-full;
            }
            .table th {
                background: var(--bg-secondary);
                color: var(--text-secondary);
                @apply px-4 py-3 text-left text-sm font-medium;
                font-family: var(--font-body);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .table td {
                @apply px-4 py-4 border-t;
                border-color: var(--border);
                color: var(--text-primary);
            }
            .table tr:hover td {
                background: color-mix(in srgb, var(--accent) 5%, transparent);
            }

            /* ==================== 标签/徽章 ==================== */
            .badge {
                @apply inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium;
            }
            .badge-primary {
                background: color-mix(in srgb, var(--accent) 15%, transparent);
                color: var(--accent);
            }
            .badge-success {
                background: color-mix(in srgb, var(--success) 15%, transparent);
                color: var(--success);
            }
            .badge-warning {
                background: color-mix(in srgb, var(--warning) 15%, transparent);
                color: var(--warning);
            }
            .badge-error {
                background: color-mix(in srgb, var(--error) 15%, transparent);
                color: var(--error);
            }

            /* ==================== 导航 ==================== */
            .nav-item {
                @apply flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-200;
                color: var(--text-secondary);
            }
            .nav-item:hover {
                background: color-mix(in srgb, var(--accent) 10%, transparent);
                color: var(--accent);
            }
            .nav-item-active {
                background: color-mix(in srgb, var(--accent) 15%, transparent);
                color: var(--accent);
                font-weight: 500;
            }

            /* ==================== 弹窗 ==================== */
            .modal-overlay {
                @apply fixed inset-0 z-50;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(4px);
                animation: fadeIn 0.2s ease;
            }
            .modal-content {
                @apply fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 w-full max-w-lg;
                background: var(--bg-card);
                border: 1px solid var(--border);
                @apply rounded-xl shadow-2xl;
                animation: fadeInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* ==================== 业务逻辑提示气泡 ==================== */
            .business-tip {
                @apply relative inline-flex items-center;
            }
            .business-tip-icon {
                @apply w-5 h-5 inline-flex items-center justify-center text-sm cursor-help rounded-full ml-1;
                background: color-mix(in srgb, var(--warning) 20%, transparent);
                color: var(--warning);
            }
            .business-tip-content {
                @apply absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-3 rounded-lg shadow-lg border text-sm hidden z-50 whitespace-pre-line max-h-72 overflow-y-auto;
                background: var(--bg-card);
                border-color: var(--border);
                color: var(--text-primary);
            }
            .business-tip:hover .business-tip-content {
                @apply block;
            }

            /* ==================== 装饰性元素 ==================== */
            .gradient-border {
                position: relative;
                background: var(--bg-card);
            }
            .gradient-border::before {
                content: '';
                position: absolute;
                inset: -1px;
                background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
                border-radius: inherit;
                z-index: -1;
                opacity: 0.5;
            }

            .hard-shadow {
                box-shadow: var(--hard-shadow);
            }

            .glow-effect {
                box-shadow: var(--glow);
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex">
    <!-- 侧边栏 -->
    <aside class="w-64 bg-white shadow-lg flex-shrink-0">
        <!-- Logo - 点击返回仪表盘 -->
        <a href="dashboard.html" class="flex items-center gap-2 p-4 text-xl font-bold text-gray-800 border-b hover:bg-gray-50 transition-colors">
            <i data-lucide="box" class="w-6 h-6"></i>
            <span>{{PROJECT_NAME}}</span>
        </a>

        <!-- 导航菜单 -->
        <nav class="p-4 space-y-1">
            <a href="dashboard.html" class="menu-item">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>仪表盘</span>
            </a>
            <!-- NAV_ITEMS -->
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col">
        <!-- 顶部导航栏 -->
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
            <!-- 面包屑 -->
            <nav class="text-sm flex items-center gap-2">
                <a href="dashboard.html" class="text-gray-500 hover:text-gray-700 flex items-center gap-1">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    首页
                </a>
                <span class="text-gray-400">/</span>
                <span class="text-gray-900">{{PAGE_TITLE}}</span>
            </nav>

            <!-- 用户信息 -->
            <div class="flex items-center gap-4">
                <button class="text-gray-500 hover:text-gray-700 relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">3</span>
                </button>
                <div class="flex items-center gap-2 cursor-pointer">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </div>
                    <span class="text-gray-700">管理员</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                </div>
            </div>
        </header>

        <!-- 页面内容 -->
        <div class="flex-1 p-6 overflow-auto">
            <!-- PAGE_CONTENT -->
        </div>
    </main>

    <!-- 弹窗遮罩（全局） -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeAllModals()"></div>

    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 打开弹窗
        function openModal(id) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        // 关闭弹窗
        function closeModal(id) {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById(id).classList.add('hidden');
        }

        // 关闭所有弹窗
        function closeAllModals() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.querySelectorAll('.modal-content').forEach(modal => {
                modal.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
