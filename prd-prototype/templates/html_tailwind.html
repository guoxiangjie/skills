<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        /* 主题色变量 - 生成时替换 */
        :root {
            --primary-color: {{PRIMARY_COLOR}};
            --primary-hover: {{PRIMARY_HOVER}};
            --primary-light: {{PRIMARY_LIGHT}};
            --success-color: {{SUCCESS_COLOR}};
            --warning-color: {{WARNING_COLOR}};
            --error-color: {{ERROR_COLOR}};
        }
    </style>
    <style type="text/tailwindcss">
        @layer components {
            /* 卡片 */
            .card {
                @apply bg-white rounded-lg shadow p-6;
            }
            /* 按钮 */
            .btn {
                @apply px-4 py-2 rounded transition-colors inline-flex items-center gap-2;
            }
            .btn-primary {
                background-color: var(--primary-color);
                color: white;
            }
            .btn-primary:hover {
                background-color: var(--primary-hover);
            }
            .btn-secondary {
                @apply bg-white text-gray-700 border border-gray-300 hover:bg-gray-50;
            }
            .btn-danger {
                background-color: var(--error-color);
                color: white;
            }
            .btn-danger:hover {
                filter: brightness(1.1);
            }
            /* 表单 */
            .form-input {
                @apply w-full border border-gray-300 rounded px-3 py-2 focus:border-blue-500 focus:outline-none;
            }
            .form-input:focus {
                border-color: var(--primary-color);
            }
            .form-label {
                @apply block text-gray-700 font-medium mb-1;
            }
            /* 标签 */
            .tag {
                @apply px-2 py-1 rounded text-xs;
            }
            .tag-success {
                background-color: var(--success-color);
                color: white;
            }
            .tag-warning {
                background-color: var(--warning-color);
                color: white;
            }
            .tag-danger {
                background-color: var(--error-color);
                color: white;
            }
            .tag-info {
                background-color: var(--primary-color);
                color: white;
            }
            /* 侧边栏菜单项 */
            .menu-item {
                @apply flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors;
            }
            .menu-item-active {
                background-color: var(--primary-light);
                color: var(--primary-color);
            }
            .menu-item-active:hover {
                background-color: var(--primary-light);
            }
            /* 弹窗遮罩 */
            .modal-overlay {
                @apply fixed inset-0 bg-black/50 z-50;
            }
            .modal-content {
                @apply fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-lg shadow-xl z-50;
            }
            /* 业务逻辑提示气泡 */
            .business-tip {
                @apply relative inline-flex items-center;
            }
            .business-tip-icon {
                @apply w-5 h-5 inline-flex items-center justify-center text-sm cursor-help bg-amber-100 rounded-full;
            }
            .business-tip-content {
                @apply absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-3 bg-white rounded-lg shadow-lg border text-sm text-gray-700 hidden z-50 whitespace-pre-line max-h-72 overflow-y-auto;
            }
            .business-tip:hover .business-tip-content {
                @apply block;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex">
    <!-- 侧边栏 -->
    <aside class="w-64 bg-white shadow-lg flex-shrink-0">
        <!-- Logo - 点击返回仪表盘 -->
        <a href="dashboard.html" class="flex items-center gap-2 p-4 text-xl font-bold text-gray-800 border-b hover:bg-gray-50 transition-colors">
            <i data-lucide="box" class="w-6 h-6"></i>
            <span>{{PROJECT_NAME}}</span>
        </a>

        <!-- 导航菜单 -->
        <nav class="p-4 space-y-1">
            <a href="dashboard.html" class="menu-item">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>仪表盘</span>
            </a>
            <!-- NAV_ITEMS -->
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col">
        <!-- 顶部导航栏 -->
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
            <!-- 面包屑 -->
            <nav class="text-sm flex items-center gap-2">
                <a href="dashboard.html" class="text-gray-500 hover:text-gray-700 flex items-center gap-1">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    首页
                </a>
                <span class="text-gray-400">/</span>
                <span class="text-gray-900">{{PAGE_TITLE}}</span>
            </nav>

            <!-- 用户信息 -->
            <div class="flex items-center gap-4">
                <button class="text-gray-500 hover:text-gray-700 relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">3</span>
                </button>
                <div class="flex items-center gap-2 cursor-pointer">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </div>
                    <span class="text-gray-700">管理员</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                </div>
            </div>
        </header>

        <!-- 页面内容 -->
        <div class="flex-1 p-6 overflow-auto">
            <!-- PAGE_CONTENT -->
        </div>
    </main>

    <!-- 弹窗遮罩（全局） -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeAllModals()"></div>

    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 打开弹窗
        function openModal(id) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        // 关闭弹窗
        function closeModal(id) {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById(id).classList.add('hidden');
        }

        // 关闭所有弹窗
        function closeAllModals() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.querySelectorAll('.modal-content').forEach(modal => {
                modal.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
