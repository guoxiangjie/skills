<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- Naive UI -->
    <script src="https://unpkg.com/naive-ui"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        body { margin: 0; background: #f5f7f9; }
        #app { min-height: 100vh; }
        .logo-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #e0e0e0;
        }
        .logo-link:hover {
            background: #f5f5f5;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <n-config-provider :theme-overrides="themeOverrides">
            <n-message-provider>
                <n-dialog-provider>
                    <!-- 页面布局 -->
                    <n-layout has-sider>
                        <!-- 侧边栏 -->
                        <n-layout-sider
                            bordered
                            collapse-mode="width"
                            :collapsed-width="64"
                            :width="240"
                            :native-scrollbar="false"
                            show-trigger
                        >
                            <!-- Logo - 点击返回仪表盘 -->
                            <a href="../dashboard.html" class="logo-link">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.29 7 12 12 20.71 7"></polyline><line x1="12" y1="22" x2="12" y2="12"></line></svg>
                                <span v-if="!collapsed">{{PROJECT_NAME}}</span>
                            </a>
                            <n-menu
                                :options="menuOptions"
                                :value="currentMenu"
                                @update:value="handleMenuChange"
                            />
                        </n-layout-sider>

                        <!-- 主内容区 -->
                        <n-layout>
                            <!-- 顶部导航 -->
                            <n-layout-header bordered class="px-6 py-4">
                                <n-space justify="space-between" align="center">
                                    <n-breadcrumb>
                                        <n-breadcrumb-item href="../dashboard.html">
                                            <span class="menu-item">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                                                首页
                                            </span>
                                        </n-breadcrumb-item>
                                        <n-breadcrumb-item>{{PAGE_TITLE}}</n-breadcrumb-item>
                                    </n-breadcrumb>
                                    <n-space align="center">
                                        <n-badge :value="3" :max="99">
                                            <n-button text>
                                                <template #icon>
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg>
                                                </template>
                                            </n-button>
                                        </n-badge>
                                        <n-dropdown :options="userOptions" @select="handleUserSelect">
                                            <n-space align="center" style="cursor: pointer;">
                                                <n-avatar round size="small">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                                </n-avatar>
                                                <span>管理员</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>
                                            </n-space>
                                        </n-dropdown>
                                    </n-space>
                                </n-space>
                            </n-layout-header>

                            <!-- 内容 -->
                            <n-layout-content class="p-6">
                                <!-- PAGE_CONTENT -->
                            </n-layout-content>
                        </n-layout>
                    </n-layout>
                </n-dialog-provider>
            </n-message-provider>
        </n-config-provider>
    </div>

    <script>
        const { createApp, ref, h } = Vue;
        const { NIcon } = naive;

        // Lucide 图标 SVG 渲染函数
        function renderLucideIcon(svgContent) {
            return () => h('span', {
                innerHTML: svgContent,
                style: { display: 'inline-flex', alignItems: 'center' }
            });
        }

        // 图标 SVG 字符串
        const icons = {
            home: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>',
            users: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>',
            shoppingBag: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>',
            settings: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>',
            layoutDashboard: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>'
        };

        function renderIcon(iconName) {
            const icon = icons[iconName];
            if (!icon) return null;
            return () => h(NIcon, null, {
                default: () => h('span', {
                    innerHTML: icon,
                    style: { display: 'flex', alignItems: 'center' }
                })
            });
        }

        const app = createApp({
            setup() {
                const currentMenu = ref(window.location.pathname.split('/').pop() || 'dashboard.html');

                // 主题色配置 - 生成时替换
                const themeOverrides = {
                    common: {
                        primaryColor: '{{PRIMARY_COLOR}}',
                        primaryColorHover: '{{PRIMARY_HOVER}}',
                        primaryColorPressed: '{{PRIMARY_COLOR}}',
                        successColor: '{{SUCCESS_COLOR}}',
                        warningColor: '{{WARNING_COLOR}}',
                        errorColor: '{{ERROR_COLOR}}'
                    }
                };

                // 菜单配置
                const menuOptions = ref([
                    {
                        label: '仪表盘',
                        key: '../dashboard.html',
                        icon: renderIcon('layoutDashboard')
                    },
                    // NAV_ITEMS
                ]);

                // 用户下拉菜单
                const userOptions = ref([
                    { label: '个人设置', key: 'profile' },
                    { label: '退出登录', key: 'logout' }
                ]);

                const handleMenuChange = (key) => {
                    window.location.href = key;
                };

                const handleUserSelect = (key) => {
                    if (key === 'logout') {
                        window.location.href = '../index.html';
                    }
                };

                return {
                    currentMenu,
                    themeOverrides,
                    menuOptions,
                    userOptions,
                    handleMenuChange,
                    handleUserSelect
                };
            }
        });

        app.use(naive);
        app.mount('#app');
    </script>
</body>
</html>
