<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <el-menu mode="horizontal" :router="true" :default-active="currentPage">
            <el-menu-item index="index.html">{{PROJECT_NAME}}</el-menu-item>
            <el-menu-item index="dashboard.html">仪表盘</el-menu-item>
            <!-- NAV_ITEMS -->
        </el-menu>

        <!-- 主内容区 -->
        <div class="container">
            <!-- PAGE_CONTENT -->
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const currentPage = ref(window.location.pathname);
                return { currentPage };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
